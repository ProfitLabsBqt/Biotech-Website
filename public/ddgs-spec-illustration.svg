<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%" style="background: transparent; overflow: visible;">
  <defs>
    <!-- Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8dc63f" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#8dc63f" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7df58" />
      <stop offset="100%" stop-color="#8dc63f" />
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Glow in Background -->
  <circle cx="250" cy="200" r="180" fill="url(#glow)" />

  <!-- Tech Grid Lines -->
  <g stroke="rgba(255, 255, 255, 0.05)" stroke-width="1">
    <line x1="50" y1="100" x2="450" y2="100" />
    <line x1="50" y1="200" x2="450" y2="200" />
    <line x1="50" y1="300" x2="450" y2="300" />
    <line x1="150" y1="50" x2="150" y2="350" />
    <line x1="250" y1="50" x2="250" y2="350" />
    <line x1="350" y1="50" x2="350" y2="350" />
  </g>

  <!-- Glowing HUD Elements -->
  <circle cx="250" cy="200" r="140" fill="none" stroke="rgba(141, 198, 63, 0.1)" stroke-width="2" stroke-dasharray="8 6" />
  <circle cx="250" cy="200" r="150" fill="none" stroke="rgba(251, 191, 36, 0.15)" stroke-width="1.5" />

  <!-- Isometric Product Jar/Container Representation -->
  <g transform="translate(180, 80)">
    <!-- Back of the Jar -->
    <ellipse cx="70" cy="200" rx="60" ry="25" fill="rgba(255, 255, 255, 0.03)" stroke="url(#border-grad)" stroke-width="1.5" />
    
    <!-- Cylinder Body -->
    <path d="M 10,60 A 60,25 0 0,0 130,60 L 130,200 A 60,25 0 0,1 10,200 Z" fill="url(#glass-grad)" stroke="url(#border-grad)" stroke-width="1.5" />
    
    <!-- DDGS Golden Granular Content (Simulated Feed Grain Volume) -->
    <path d="M 15,100 A 55,22 0 0,0 125,100 L 125,200 A 55,22 0 0,1 15,200 Z" fill="url(#gold-grad)" opacity="0.85" />
    
    <!-- Grain particles detail -->
    <ellipse cx="70" cy="100" rx="55" ry="22" fill="#d97706" opacity="0.9" />
    <circle cx="45" cy="115" r="3" fill="#fbbf24" />
    <circle cx="65" cy="130" r="4" fill="#f59e0b" />
    <circle cx="85" cy="110" r="3.5" fill="#d97706" />
    <circle cx="95" cy="140" r="2.5" fill="#fbbf24" />
    <circle cx="55" cy="160" r="4" fill="#b45309" />
    <circle cx="75" cy="175" r="3" fill="#f59e0b" />
    <circle cx="90" cy="165" r="3.5" fill="#fbbf24" />
    
    <!-- Jar Lid (Premium Metal) -->
    <path d="M 25,40 A 45,18 0 0,0 115,40 L 115,60 A 45,18 0 0,1 25,60 Z" fill="linear-gradient(to right, #9ca3af, #f3f4f6, #4b5563)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <ellipse cx="70" cy="40" rx="45" ry="18" fill="#e5e7eb" stroke="rgba(255,255,255,0.3)" />

    <!-- Label on the Jar -->
    <rect x="25" y="110" width="90" height="60" rx="4" fill="rgba(255, 255, 255, 0.95)" />
    <text x="70" y="128" font-family="-apple-system, sans-serif" font-size="8" font-weight="bold" fill="#040914" text-anchor="middle" letter-spacing="0.5">BIOTECH FUELS</text>
    <text x="70" y="142" font-family="-apple-system, sans-serif" font-size="11" font-weight="900" fill="#b45309" text-anchor="middle">RICE DDGS</text>
    <text x="70" y="152" font-family="-apple-system, sans-serif" font-size="6" font-weight="bold" fill="#8dc63f" text-anchor="middle" letter-spacing="0.5">45% PROTEIN</text>
    <line x1="35" y1="158" x2="105" y2="158" stroke="rgba(0,0,0,0.1)" stroke-width="1" />
  </g>

  <!-- Side Floating Spec Labels -->
  <!-- Left Spec: Protein -->
  <g transform="translate(60, 140)" filter="url(#neon-glow)">
    <rect x="0" y="0" width="100" height="45" rx="12" fill="rgba(4, 9, 20, 0.75)" stroke="#8dc63f" stroke-width="1.5" />
    <text x="50" y="18" font-family="-apple-system, sans-serif" font-size="10" fill="#a7df58" text-anchor="middle" font-weight="bold">PROTEIN</text>
    <text x="50" y="36" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">~45%</text>
  </g>
  <path d="M 160,162 L 205,190" stroke="#8dc63f" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6" />

  <!-- Right Spec: Moisture -->
  <g transform="translate(340, 210)" filter="url(#neon-glow)">
    <rect x="0" y="0" width="100" height="45" rx="12" fill="rgba(4, 9, 20, 0.75)" stroke="#fbbf24" stroke-width="1.5" />
    <text x="50" y="18" font-family="-apple-system, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">MOISTURE</text>
    <text x="50" y="36" font-family="-apple-system, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">&lt;10%</text>
  </g>
  <path d="M 340,232 L 295,250" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6" />

  <!-- Interactive/Process Wave Overlay -->
  <path d="M 50,340 Q 150,320 250,340 T 450,340" fill="none" stroke="url(#green-grad)" stroke-width="3" opacity="0.4" />
</svg>
